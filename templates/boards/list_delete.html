<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar lista</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow border-0 mx-auto" style="max-width: 600px;">

            <div class="card-header bg-danger text-white">
                <h3 class="mb-0">Eliminar lista</h3>
            </div>

            <div class="card-body">

                <p class="fs-5">
                    ¿Está seguro que desea eliminar esta lista?
                </p>

                <div class="alert alert-warning">
                    <strong>{{ task_list.title }}</strong>
                </div>

                <form method="post">
                    {% csrf_token %}

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'boards:board_detail' task_list.board.id %}" class="btn btn-secondary">
                            Cancelar
                        </a>

                        <button type="submit" class="btn btn-danger">
                            Sí, eliminar
                        </button>
                    </div>
                </form>

            </div>

        </div>

    </div>

</body>

</html>
