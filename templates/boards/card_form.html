<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Nueva tarjeta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow border-0 mx-auto" style="max-width: 650px;">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Nueva tarjeta</h4>
            </div>

            <div class="card-body">
                <p class="text-muted">
                    Lista: <strong>{{ task_list.title }}</strong>
                </p>

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'boards:board_detail' task_list.board.id %}" class="btn btn-outline-secondary">
                            Volver
                        </a>

                        <button type="submit" class="btn btn-success">
                            Guardar tarjeta
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>

</html>
