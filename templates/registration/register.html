<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta - SGT</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">

        <div class="card shadow-lg border-0" style="max-width:500px; width:100%;">

            <div class="card-header bg-success text-white text-center py-3">

                <h3 class="mb-1">SGT</h3>

                <small>Sistema de Gestión de Tareas</small>

            </div>

            <div class="card-body p-4">

                <h4 class="text-center mb-4">
                    Crear una cuenta
                </h4>

                <form method="post">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit" class="btn btn-success w-100 mt-3">

                        Registrarse

                    </button>

                </form>

                <hr>

                <div class="text-center">

                    <p class="mb-0">

                        ¿Ya tienes una cuenta?

                        <a href="{% url 'login' %}" class="text-decoration-none fw-semibold">

                            Iniciar sesión

                        </a>

                    </p>

                </div>

            </div>

            <div class="card-footer text-center text-muted">

                <small>Proyecto SGT • Django 6</small>

            </div>

        </div>

    </div>

</body>

</html>
