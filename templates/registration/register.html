<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Crear cuenta</title>
</head>

<body>
    <h1>Crear cuenta</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Registrarse</button>
    </form>

    <p>
        ¿Ya tienes cuenta?
        <a href="{% url 'login' %}">Iniciar sesión</a>
    </p>
</body>

</html>
